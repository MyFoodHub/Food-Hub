<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar - FoodHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    background: #050810;
    color: #ffffff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    overflow-x: hidden;
  }

  .login-wrapper {
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.6s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    text-align: center;
    margin-bottom: 6px;
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.5px;
    user-select: none;
  }

  .logo-food { color: #ffffff; }
  .logo-hub { color: #00C8FF; }

  .logo-dot {
    display: inline-block;
    width: 9px;
    height: 9px;
    background: #00C8FF;
    border-radius: 50%;
    margin-left: 2px;
    vertical-align: super;
    animation: pulse-dot 2.4s ease-in-out infinite;
    box-shadow: 0 0 8px rgba(0, 200, 255, 0.4);
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 0.4; transform: scale(1); box-shadow: 0 0 8px rgba(0, 200, 255, 0.2); }
    50% { opacity: 1; transform: scale(1.4); box-shadow: 0 0 16px rgba(0, 200, 255, 0.6); }
  }

  .subtitle {
    text-align: center;
    color: #6b7a99;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .tagline {
    text-align: center;
    color: #3d4a63;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.3px;
    margin-bottom: 36px;
    font-style: italic;
  }

  .card {
    background: #080D18;
    border: 1px solid rgba(255, 255, 255, 0.055);
    border-radius: 16px;
    padding: 32px 28px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #8a95ad;
    margin-bottom: 6px;
  }

  .form-group input {
    width: 100%;
    height: 48px;
    padding: 0 16px;
    background: #0c1322;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    color: #ffffff;
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .form-group input::placeholder {
    color: #3d4a63;
  }

  .form-group input:focus {
    border-color: #00C8FF;
    box-shadow: 0 0 0 3px rgba(0, 200, 255, 0.08);
  }

  .password-wrapper {
    position: relative;
  }

  .password-wrapper input {
    padding-right: 48px;
  }

  .eye-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #3d4a63;
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    transition: color 0.2s;
    line-height: 1;
  }

  .eye-toggle:hover {
    color: #00C8FF;
  }

  .btn-entrar {
    width: 100%;
    height: 48px;
    margin-top: 8px;
    background: #00C8FF;
    color: #050810;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    position: relative;
    letter-spacing: 0.3px;
  }

  .btn-entrar:hover {
    opacity: 0.92;
    box-shadow: 0 4px 20px rgba(0, 200, 255, 0.25);
  }

  .btn-entrar:active { transform: scale(0.98); }
  .btn-entrar:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-text { transition: opacity 0.2s; }
  .btn-entrar.loading .btn-text { opacity: 0; }

  .spinner {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    width: 22px; height: 22px;
    margin: -11px 0 0 -11px;
    border: 3px solid rgba(5, 8, 16, 0.25);
    border-top-color: #050810;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  .btn-entrar.loading .spinner { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-phrase {
    display: none;
    text-align: center;
    margin-top: 14px;
    color: #3d4a63;
    font-size: 13px;
    font-style: italic;
    animation: fadePulse 1.8s ease-in-out infinite;
  }

  .loading-phrase.visible { display: block; }

  @keyframes fadePulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .error-msg {
    margin-top: 16px;
    padding: 12px 14px;
    background: rgba(255, 60, 60, 0.08);
    border: 1px solid rgba(255, 60, 60, 0.18);
    border-radius: 8px;
    color: #ff6b6b;
    font-size: 13px;
    line-height: 1.5;
    display: none;
  }

  .error-msg.visible { display: block; }

  .forgot-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: #6b7a99;
    font-size: 13px;
    text-decoration: none;
    cursor: pointer;
    transition: color 0.2s;
  }

  .forgot-link:hover { color: #00C8FF; }

  .reset-success {
    margin-top: 16px;
    padding: 12px 14px;
    background: rgba(0, 200, 255, 0.06);
    border: 1px solid rgba(0, 200, 255, 0.15);
    border-radius: 8px;
    color: #00C8FF;
    font-size: 13px;
    line-height: 1.5;
    display: none;
  }

  .reset-success.visible { display: block; }

  @media (max-width: 400px) {
    .card { padding: 24px 20px; }
    .logo { font-size: 34px; }
  }

  @media (min-width: 768px) {
    .logo { font-size: 46px; }
    .card { padding: 36px 32px; }
  }

  @media (min-width: 1200px) {
    .login-wrapper { max-width: 440px; }
  }

  /* === KYC mode (modo convite, D38/D43) ============================ */
  .kyc-header {
    text-align: center;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .kyc-razao { font-size: 18px; font-weight: 600; color: #ffffff; margin-bottom: 4px; }
  .kyc-tipo { font-size: 13px; color: #00C8FF; font-weight: 500; letter-spacing: 0.4px; text-transform: uppercase; }

  .video-placeholder {
    margin-bottom: 24px;
    background: linear-gradient(135deg, #0c1322 0%, #060a14 100%);
    border: 1px solid rgba(0, 200, 255, 0.12);
    border-radius: 10px;
    aspect-ratio: 16 / 9;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .video-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(0, 200, 255, 0.1);
    border: 1px solid rgba(0, 200, 255, 0.25);
    display: flex; align-items: center; justify-content: center;
    color: #00C8FF; font-size: 18px;
  }
  .video-text { color: #6b7a99; font-size: 13px; font-style: italic; }

  .info-msg {
    margin-top: 16px; padding: 12px 14px;
    background: rgba(0, 200, 255, 0.06);
    border: 1px solid rgba(0, 200, 255, 0.15);
    border-radius: 8px;
    color: #00C8FF; font-size: 13px; line-height: 1.5;
    display: none;
  }
  .info-msg.visible { display: block; }
</style>
</head>
<body>

<div class="login-wrapper">
  <div class="logo">
    <span class="logo-food">Food</span><span class="logo-hub">Hub</span><span class="logo-dot"></span>
  </div>
  <div class="subtitle">Mesa Nacional de Oportunidades</div>
  <div class="tagline">Acesso exclusivo. Apenas convidados.</div>

  <div class="card" id="loginCard">
    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" placeholder="Sua senha" autocomplete="current-password" required>
          <button type="button" class="eye-toggle" id="eyeToggle" aria-label="Mostrar senha">&#128065;</button>
        </div>
      </div>
      <button type="submit" class="btn-entrar" id="btnEntrar">
        <span class="btn-text">Entrar</span>
        <span class="spinner"></span>
      </button>
    </form>

    <div class="loading-phrase" id="loadingPhrase">Sua mesa est&aacute; sendo preparada...</div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="reset-success" id="resetMsg">Link de recupera&ccedil;&atilde;o enviado para seu email.</div>

    <a class="forgot-link" id="forgotLink">Esqueceu a senha?</a>
  </div>

  <!-- card KYC: mostrado apenas com ?convite=TOKEN na URL (D38/D43) -->
  <div class="card" id="kycCard" style="display:none;">
    <div class="kyc-header">
      <div class="kyc-razao" id="kycRazao"></div>
      <div class="kyc-tipo" id="kycTipo"></div>
    </div>

    <!-- VIDEO_SAMANTA_AQUI -->
    <div class="video-placeholder">
      <div class="video-icon">&#9658;</div>
      <div class="video-text">Apresenta&ccedil;&atilde;o em breve</div>
    </div>

    <form id="kycForm">
      <div class="form-group">
        <label for="cnpj">CNPJ</label>
        <input type="text" id="cnpj" name="cnpj" placeholder="00.000.000/0000-00" inputmode="numeric" autocomplete="off" required>
      </div>
      <div class="form-group">
        <label for="whatsapp">WhatsApp</label>
        <input type="tel" id="whatsapp" name="whatsapp" placeholder="(11) 99999-9999" inputmode="tel" autocomplete="off" required>
      </div>
      <button type="submit" class="btn-entrar" id="btnConfirmar">
        <span class="btn-text">Confirmar</span>
        <span class="spinner"></span>
      </button>
    </form>

    <div class="loading-phrase" id="kycLoadingPhrase">Validando...</div>
    <div class="error-msg" id="kycErrorMsg"></div>
    <div class="info-msg" id="kycInfoMsg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // Client unico para autenticacao + RPC (legacy anon JWT — publishable quebra Realtime).
  // P0-fix S3 Bloco B: removido _sbAdmin com service_role hardcoded.
  // Chave ja rotacionada em 26/abr/2026 (registrado em SEGURANCA_E_MITIGACAO.md).
  // Lookup de player pos-login passa pela RLS de players via auth.uid().
  // P1-emergency S3: legacy anon morta. Swap publishable. Realtime TODO V1.5.
  var _sb = supabase.createClient(
    'https://jqbuckofiaopxwllghac.supabase.co',
    'sb_publishable_LFZQkiPcCv1NbBLu6jUPXg_N5qY8zmi'
  );

  var form = document.getElementById('loginForm');
  var btnEntrar = document.getElementById('btnEntrar');
  var emailInput = document.getElementById('email');
  var passwordInput = document.getElementById('password');
  var eyeToggle = document.getElementById('eyeToggle');
  var errorMsg = document.getElementById('errorMsg');
  var resetMsg = document.getElementById('resetMsg');
  var forgotLink = document.getElementById('forgotLink');
  var loadingPhrase = document.getElementById('loadingPhrase');

  function togglePassword() {
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      eyeToggle.innerHTML = '&#128584;';
    } else {
      passwordInput.type = 'password';
      eyeToggle.innerHTML = '&#128065;';
    }
  }

  eyeToggle.addEventListener('click', togglePassword);

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('visible');
    resetMsg.classList.remove('visible');
    loadingPhrase.classList.remove('visible');
  }

  function clearMessages() {
    errorMsg.classList.remove('visible');
    resetMsg.classList.remove('visible');
    loadingPhrase.classList.remove('visible');
  }

  function setLoading(state) {
    if (state) {
      btnEntrar.classList.add('loading');
      btnEntrar.disabled = true;
      loadingPhrase.classList.add('visible');
    } else {
      btnEntrar.classList.remove('loading');
      btnEntrar.disabled = false;
      loadingPhrase.classList.remove('visible');
    }
  }

  // Resolve destino apos login. D35: tipo eh text[] em players com valores
  // 'mesa', 'comprador', 'fornecedor' (sem 'industria'/'cliente' — bug legado).
  // 'seller'/'originador' sao papeis posicionais em deals, nao em players.tipo.
  function resolveRedirect(tipo) {
    if (!Array.isArray(tipo)) return 'demandas.html';
    if (tipo.indexOf('mesa') !== -1)       return 'mesa.html';
    if (tipo.indexOf('fornecedor') !== -1) return 'vitrine.html';
    if (tipo.indexOf('comprador') !== -1)  return 'demandas.html';
    return 'demandas.html';
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    clearMessages();

    var email = emailInput.value.trim();
    var password = passwordInput.value;

    if (!email || !password) return;

    setLoading(true);

    _sb.auth.signInWithPassword({ email: email, password: password })
      .then(function(authResult) {
        if (authResult.error) {
          setLoading(false);
          showError('Email ou senha incorretos.');
          return;
        }

        // Lookup do player via auth_user_id (RLS canonica: auth.uid() = auth_user_id).
        // Cleanup S3 Bloco B: removido fallback chain members/profiles (legado MVP, dead code).
        return _sb.from('players')
          .select('id, tipo, status, contato_nome, razao_social, email')
          .eq('auth_user_id', authResult.data.user.id)
          .single()
          .then(function(playerResult) {
            setLoading(false);
            if (playerResult.error || !playerResult.data) {
              showError('Acesso exclusivo. Apenas convidados. Entre em contato com a mesa FoodHub.');
              return;
            }
            var player = playerResult.data;
            sessionStorage.setItem('player', JSON.stringify(player));
            window.location.href = resolveRedirect(player.tipo);
          });
      })
      .catch(function() {
        setLoading(false);
        showError('Email ou senha incorretos.');
      });
  });

  forgotLink.addEventListener('click', function() {
    clearMessages();

    var email = emailInput.value.trim();
    if (!email) {
      showError('Digite seu email acima para recuperar a senha.');
      return;
    }

    forgotLink.style.pointerEvents = 'none';
    forgotLink.style.opacity = '0.4';

    _sb.auth.resetPasswordForEmail(email)
      .then(function() {
        resetMsg.classList.add('visible');
        errorMsg.classList.remove('visible');
      })
      .catch(function() {
        showError('Erro ao enviar email de recuperacao. Tente novamente.');
      })
      .finally(function() {
        forgotLink.style.pointerEvents = '';
        forgotLink.style.opacity = '';
      });
  });

  // ─── Modo convite (D38/D43) ──────────────────────────────────
  // Detecta ?convite=TOKEN na URL. Se houver, esconde login e
  // valida via RPC validar_convite_token (criada em 010, Etapa B.1).
  // Submit do KYC eh stub — RPC completar_kyc vem na Etapa B.3.
  var _conviteToken = null;

  function tipoLabel(tipoArr) {
    if (!Array.isArray(tipoArr) || tipoArr.length === 0) return '';
    var labels = { mesa: 'Mesa', comprador: 'Comprador', fornecedor: 'Fornecedor' };
    return tipoArr.map(function(t) { return labels[t] || t; }).join(' + ');
  }

  function showKycError(msg) {
    var el = document.getElementById('kycErrorMsg');
    el.textContent = msg;
    el.classList.add('visible');
    document.getElementById('kycInfoMsg').classList.remove('visible');
    document.getElementById('kycLoadingPhrase').classList.remove('visible');
  }

  function showKycInfo(msg) {
    var el = document.getElementById('kycInfoMsg');
    el.textContent = msg;
    el.classList.add('visible');
    document.getElementById('kycErrorMsg').classList.remove('visible');
  }

  function setKycLoading(state) {
    var btn = document.getElementById('btnConfirmar');
    var phrase = document.getElementById('kycLoadingPhrase');
    if (state) { btn.classList.add('loading'); btn.disabled = true; phrase.classList.add('visible'); }
    else       { btn.classList.remove('loading'); btn.disabled = false; phrase.classList.remove('visible'); }
  }

  // Validacao pt-BR: CNPJ 14 digitos, WhatsApp 10/11 (+55 opcional).
  function validarCnpj(s) {
    return ((s || '').replace(/\D/g, '')).length === 14;
  }
  function validarWhatsapp(s) {
    var d = (s || '').replace(/\D/g, '');
    if (d.length === 12 || d.length === 13) return d.charAt(0) === '5' && d.charAt(1) === '5';
    return d.length === 10 || d.length === 11;
  }

  function mapErroConvite(msg) {
    var m = (msg || '').toString();
    if (m.indexOf('expirado') !== -1 || m.indexOf('inv') !== -1)
      return 'Convite invalido ou expirado. Entre em contato com a Mesa FoodHub.';
    if (m.indexOf('bloqueado') !== -1)
      return 'Cadastro bloqueado. Entre em contato com a Mesa FoodHub.';
    if (m.indexOf('completo') !== -1)
      return 'Cadastro ja completo. Use a tela de login normal.';
    return 'Erro ao validar convite: ' + m;
  }

  // Mapa de erros do RPC completar_kyc → mensagens user-friendly.
  // Ordem importa: especifico antes de generico (KYC antes de Cadastro completo, etc.).
  function mapErroKyc(msg) {
    var m = (msg || '').toString();
    if (m.indexOf('CNPJ inv') !== -1)
      return 'CNPJ deve ter 14 dígitos. Verifique e tente novamente.';
    if (m.indexOf('WhatsApp inv') !== -1)
      return 'WhatsApp inválido. Use formato (XX) XXXXX-XXXX.';
    if (m.indexOf('CNPJ já cadastrado') !== -1 || m.indexOf('CNPJ ja cadastrado') !== -1)
      return 'Este CNPJ já está cadastrado. Entre em contato com a Mesa FoodHub.';
    if (m.indexOf('KYC') !== -1 && m.indexOf('completo') !== -1)
      return 'Cadastro já enviado. Aguarde aprovação da Mesa.';
    if (m.indexOf('Cadastro já completo') !== -1 || m.indexOf('Cadastro ja completo') !== -1)
      return 'Cadastro já existe. Use a tela de login normal.';
    if (m.indexOf('bloqueado') !== -1)
      return 'Cadastro bloqueado. Entre em contato com a Mesa FoodHub.';
    if (m.indexOf('Token inv') !== -1 || m.indexOf('expirado') !== -1)
      return 'Convite expirado. Entre em contato com a Mesa FoodHub.';
    return 'Erro ao processar cadastro: ' + m;
  }

  document.addEventListener('DOMContentLoaded', function() {
    var params = new URLSearchParams(window.location.search);
    var token = params.get('convite');
    if (!token) return; // sem token: modo login normal

    _conviteToken = token;
    document.getElementById('loginCard').style.display = 'none';
    document.getElementById('kycCard').style.display = 'block';
    setKycLoading(true);

    _sb.rpc('validar_convite_token', { p_token: token })
      .then(function(result) {
        setKycLoading(false);
        if (result.error) { showKycError(mapErroConvite(result.error.message)); return; }
        var p = result.data;
        document.getElementById('kycRazao').textContent = p.razao_social || '';
        document.getElementById('kycTipo').textContent = tipoLabel(p.tipo);
      })
      .catch(function() {
        setKycLoading(false);
        showKycError('Erro de conexao. Tente novamente.');
      });
  });

  document.getElementById('kycForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var cnpj = document.getElementById('cnpj').value;
    var whatsapp = document.getElementById('whatsapp').value;

    if (!validarCnpj(cnpj))      { showKycError('CNPJ invalido. Digite os 14 digitos.'); return; }
    if (!validarWhatsapp(whatsapp)) { showKycError('WhatsApp invalido. Use o formato (XX) XXXXX-XXXX.'); return; }

    var cnpjDigits = cnpj.replace(/\D/g, '');
    var waDigits   = whatsapp.replace(/\D/g, '');

    // S3 Bloco B.4: chama RPC completar_kyc (D38). Sanitização/estado server-side em 011.
    document.getElementById('kycErrorMsg').classList.remove('visible');
    document.getElementById('kycInfoMsg').classList.remove('visible');
    setKycLoading(true);

    _sb.rpc('completar_kyc', {
      p_token:    _conviteToken,
      p_cnpj:     cnpjDigits,
      p_whatsapp: waDigits
    })
      .then(function(result) {
        setKycLoading(false);
        if (result.error) {
          showKycError(mapErroKyc(result.error.message));
          return;
        }
        // Sucesso: esconde form + video, mostra mensagem destacada. Header continua visivel.
        // Mensagem agnostica de canal (Resend so em S4) — D43.
        document.getElementById('kycForm').style.display = 'none';
        document.querySelector('.video-placeholder').style.display = 'none';
        showKycInfo('Cadastro recebido! Aguarde a aprovação da Mesa FoodHub. Entraremos em contato em breve.');
      })
      .catch(function() {
        setKycLoading(false);
        showKycError('Erro de conexao. Tente novamente em alguns segundos.');
      });
  });
</script>
</body>
</html>
